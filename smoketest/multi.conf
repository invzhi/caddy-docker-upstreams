# One container, two endpoints on different ports: an "API" and a "metrics"
# port, mirroring a service that isolates the two.
server {
    listen 8080;
    location / {
        default_type text/plain;
        return 200 "multi api\n";
    }
}

server {
    listen 9090;
    location / {
        default_type text/plain;
        return 200 "multi metrics\n";
    }
}
